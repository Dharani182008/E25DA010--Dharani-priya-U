<!DOCTYPE html>
<html>
<head>
    <title>Student Grade Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="container">
        <h2>🎓 Student Grade Prediction</h2>

        <form action="/predict" method="post">

            <input type="number" name="study_hours" placeholder="Study Hours" required>
            <br><br>

            <input type="number" name="attendance" placeholder="Attendance (%)" required>
            <br><br>

            <input type="number" name="assignment" placeholder="Assignment Score" required>
            <br><br>

            <input type="number" name="midterm" placeholder="Midterm Score" required>
            <br><br>

            <input type="number" name="final" placeholder="Final Score" required>
            <br><br>

            <button type="submit">Predict Grade</button>

        </form>

        <h3>{{ prediction_text }}</h3>

    </div>

</body>
</html>
